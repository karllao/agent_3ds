# Alembic 配置文件
# 文档：https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# 迁移脚本目录
script_location = alembic

# 迁移文件命名格式：{年月日时分秒}_{rev}_{slug}
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# 时区（影响 file_template 中的时间）
timezone = Asia/Shanghai

# 数据库连接 URL（开发时直接写；生产通过 env.py 从环境变量读取）
# 实际值在 alembic/env.py 中从 Settings 动态获取，此处留空即可
sqlalchemy.url =

# 输出编码
output_encoding = utf-8

[post_write_hooks]
# 可选：迁移文件生成后自动格式化
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
