version: "3.9"

# ── 通用重用配置 ──────────────────────────────────────────────────────────────
x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - ./backend/.env
  volumes:
    - ./backend:/app
    - storage_data:/data/storage
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - cad_agent_net

# ── 服务定义 ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cad_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cad_agent
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cad_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cad_agent_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cad_agent_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - cad_agent_net

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    <<: *backend-common
    container_name: cad_agent_backend
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app
        --log-level info
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Celery Worker（通用队列 + CAD 解析队列） ─────────────────────────────────
  celery_worker:
    <<: *backend-common
    container_name: cad_agent_worker
    command: >
      celery -A app.celery_app.celery_app worker
        --loglevel=info
        --queues=default,cad,ai,max_export
        --concurrency=4
        --hostname=worker@%h
        --max-tasks-per-child=50
    environment:
      - PYTHONPATH=/app
      - C_FORCE_ROOT=true

  # ── Flower（Celery 监控面板） ───────────────────────────────────────────────
  flower:
    <<: *backend-common
    container_name: cad_agent_flower
    command: >
      celery -A app.celery_app.celery_app flower
        --port=5555
        --url_prefix=flower
        --basic_auth=admin:admin123
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/flower/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ── 卷 ───────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local

# ── 网络 ─────────────────────────────────────────────────────────────────────
networks:
  cad_agent_net:
    driver: bridge
